name: Sift Weekly Report

on:
  schedule:
    # 每周一早上 9:00 UTC (北京时间 17:00)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sift
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          # SMTP (set in repo Secrets to enable email, or use --no-email)
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          SMTP_RECEIVER: ${{ secrets.SMTP_RECEIVER }}
          # Embedding (optional, enables semantic search)
          EMBEDDING_API_BASE_URL: ${{ secrets.EMBEDDING_API_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          SUMMARY_DAYS: '7'
          SUMMARY_LANGUAGE: 'zh-CN'
        run: python3 sift/cli.py run  # add --email to enable email delivery

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sift-report
          path: workspaces/default/output/*.md
          retention-days: 90
